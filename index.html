    <script>
        window._cdnErrors = [];
        function handleCDNError(lib) {
            window._cdnErrors.push(lib);
            document.addEventListener('DOMContentLoaded', function() {
                var el = document.getElementById('loading-indicator');
                if (el) {
                    el.innerHTML = '❌ ไม่สามารถโหลด ' + window._cdnErrors.join(', ') + ' ได้<br><span style="font-size:14px">กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วรีเฟรชหน้าเว็บ</span>';
                    el.style.color = '#ef4444';
                }
            });
        }
    </script>
    <script src="https://cdn.tailwindcss.com" onerror="handleCDNError('Tailwind CSS')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onerror="handleCDNError('Three.js')"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', 'Sarabun', sans-serif; user-select: none; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        
        /* Video Background */
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Three.js Canvas for 3D Elements */
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 2D Canvas for Text and UI overlays */
        #ui-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        
        /* HTML UI Layer */
        #html-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; }
        
        .interactive { pointer-events: auto; }
        .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .glass-panel { background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0)); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        
        /* Animations */
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pulse-fast { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-pulse-fast { animation: pulse-fast 0.5s infinite; }
    </style>
</head>

        // Vibrant neon-themed colors for maximum visibility and visual style
        const BASKET_DEFS = [
            { cat: "kob", label: "แม่กบ", color: 0xff3366, hex: "#ff3366" },  // Vibrant Neon Red
            { cat: "kod", label: "แม่กด", color: 0x00e676, hex: "#00e676" },  // Bright Neon Green

        let score = 0;

        // Game Objects
        let activeWords = [];
        let audioCtx;

        class AudioSystem {
            constructor() {
                this.initialized = false;
                this.bgmIntervalId = null;
            }
            init() {
                if (this.initialized) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                this.initialized = true;
            }
            playTone(freq, type, duration, vol=0.1) {
                if (!this.initialized || audioCtx.state === 'suspended') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }
            playBeep() { this.playTone(800, 'sine', 0.1, 0.1); }
            playCountdown() { this.playTone(440, 'square', 0.2, 0.1); }
            playStart() { this.playTone(880, 'square', 0.4, 0.1); }
            playGrab() { this.playTone(1200, 'sine', 0.05, 0.05); }
            playSuccess() { 
                this.playTone(600, 'triangle', 0.1, 0.1);
                setTimeout(() => this.playTone(800, 'triangle', 0.2, 0.1), 100);
            }
            playFail() { this.playTone(200, 'sawtooth', 0.3, 0.1); }
            startBGM() {
                this.stopBGM();
                this.bgmIntervalId = setInterval(() => {
                    if (gameState === 'PLAYING' && this.initialized && audioCtx.state === 'running') {
                        let timeLeftRatio = timer / 60;
                        let bgmPitch = 120 + (1.0 - timeLeftRatio) * 80;
                        this.playTone(bgmPitch + Math.random()*20, 'sine', 0.8, 0.015);
                    }
                }, 900);
            }
            stopBGM() {
                if (this.bgmIntervalId !== null) {
                    clearInterval(this.bgmIntervalId);
                    this.bgmIntervalId = null;
                }
            }
        }
        const audio = new AudioSystem();

        function initThreeJS() {
            scene = new THREE.Scene();
            
            // Use Orthographic camera for precise 2D UI matching
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 100;
            camera = new THREE.OrthographicCamera(
                frustumSize * aspect / -2, 
                frustumSize * aspect / 2, 
                frustumSize / 2, 
                frustumSize / -2, 
                0.1, 1000
            );
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Lighting setup for highly visible colors
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(0, 30, 20);
            scene.add(dirLight);

            createBaskets();
            
            window.addEventListener('resize', onWindowResize);
        }

        function createBaskets() {
            // Clear existing baskets
            baskets3D.forEach(b => scene.remove(b.mesh));
            baskets3D = [];

            const aspect = window.innerWidth / window.innerHeight;
            const screenWidth = 100 * aspect;
            const screenHeight = 100;
            
            const basketWidth = screenWidth / 5;
            const basketHeight = 12;
            const gap = (screenWidth - (basketWidth * 4)) / 5;
            
            // Cylinder representation (wide top, narrow base, like a bucket)
            const geometry = new THREE.CylinderGeometry(basketWidth / 2, basketWidth / 2.6, basketHeight, 32);

            BASKET_DEFS.forEach((def, index) => {
                // Highly saturated emissive material to pop beautifully
                const material = new THREE.MeshPhongMaterial({ 
                    color: def.color, 
                    emissive: def.color,
                    emissiveIntensity: 0.25,
                    transparent: false,
                    shininess: 100
                });
                const mesh = new THREE.Mesh(geometry, material);
                
                // Position at the bottom of the screen
                const startX = (-screenWidth / 2) + gap + (basketWidth / 2);
                mesh.position.x = startX + (index * (basketWidth + gap));
                mesh.position.y = (-screenHeight / 2) + (basketHeight / 2) + 8;
                
                scene.add(mesh);
                
                // Edge lines for 3D outline style
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1.5 }));
                mesh.add(line);

                // Glow Ring (Torus) at the opening rim
                const torusGeom = new THREE.TorusGeometry(basketWidth / 2, 1.2, 16, 64);
                const torusMat = new THREE.MeshPhongMaterial({ 
                    color: def.color, 
                    emissive: def.color, 
                    emissiveIntensity: 0.6 
                });
                const torus = new THREE.Mesh(torusGeom, torusMat);
                torus.rotation.x = Math.PI / 2;
                torus.position.y = basketHeight / 2;
                mesh.add(torus);

                baskets3D.push({ mesh, def, index, originalY: mesh.position.y });
            });
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 100;
            camera.left = frustumSize * aspect / -2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = frustumSize / -2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            uiCanvas.width = window.innerWidth;
            uiCanvas.height = window.innerHeight;
            
            createBaskets();
        }

        function showInitError(msg) {
            const el = document.getElementById('loading-indicator');
            el.innerHTML = msg;
            el.style.color = '#ef4444';
            el.classList.remove('animate-pulse');

        async function initMediaPipe() {
            try {
                const module = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm");
                HandLandmarker = module.HandLandmarker;
                FilesetResolver = module.FilesetResolver;
            } catch (error) {
                showInitError('❌ ไม่สามารถโหลด AI Model ได้<br><span style="font-size:14px">กรุณาตรวจสอบอินเทอร์เน็ตแล้วรีเฟรชหน้าเว็บ</span>');
                return;
            }

            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.5,
                    minHandPresenceConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
            } catch (error) {
                showInitError('❌ ไม่สามารถเริ่มต้น AI Model ได้<br><span style="font-size:14px">ลองรีเฟรชหน้าเว็บ หรือใช้เบราว์เซอร์ Chrome</span>');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }
                });
                video.srcObject = stream;
            } catch (error) {
                const msgs = {
                    NotAllowedError: '❌ กรุณาอนุญาตการใช้กล้อง<br><span style="font-size:14px">คลิกไอคอนกล้องในแถบที่อยู่เว็บ แล้วเลือก "อนุญาต"</span>',
                    NotFoundError: '❌ ไม่พบกล้อง<br><span style="font-size:14px">กรุณาเชื่อมต่อเว็บแคมแล้วรีเฟรชหน้าเว็บ</span>',
                    NotReadableError: '❌ ไม่สามารถเข้าถึงกล้องได้<br><span style="font-size:14px">อาจมีแอปอื่นใช้กล้องอยู่ กรุณาปิดแอปนั้นแล้วรีเฟรช</span>'
                };
                showInitError(msgs[error.name] || '❌ เกิดข้อผิดพลาดกับกล้อง<br><span style="font-size:14px">' + error.message + '</span>');
                return;
            }

            video.addEventListener("loadeddata", () => {
                document.getElementById('loading-indicator').style.display = 'none';
                document.getElementById('level-selector').classList.remove('hidden');
                gameState = 'MENU';

                uiCanvas.width = window.innerWidth;
                uiCanvas.height = window.innerHeight;

                gameLoop();
            });
        }

        function startGame(level, isNewGame = true) {
            audio.init();
            currentLevel = level;
            
            if (isNewGame) {
                score = 0;
            }
            
            timer = 60;
            activeWords = [];
            particles = [];
            
            updateHUD();
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('start-screen').style.opacity = '1';
                startCountdown();
            }, 500);
        }

        function startCountdown() {
            gameState = 'COUNTDOWN';
            const countScreen = document.getElementById('countdown-screen');
            const countText = document.getElementById('countdown-text');
            countScreen.classList.remove('hidden');
            
            let count = 3;
            countText.innerText = count;
            audio.playCountdown();
            countText.classList.add('animate-pulse-fast');
            
            let cInterval = setInterval(() => {
                count--;
                if(count > 0) {
                    countText.innerText = count;
                    audio.playCountdown();
                } else if(count === 0) {
                    countText.innerText = "เริ่ม!";
                    audio.playStart();
                } else {
                    clearInterval(cInterval);
                    countScreen.classList.add('hidden');
                    countText.classList.remove('animate-pulse-fast');
                    beginPlaying();
                }
            }, 1000);
        }

        function spawnWordRecursive() {
            if (gameState !== 'PLAYING') return;

            const levelData = LEVELS[currentLevel - 1];
            const randomWord = levelData.words[Math.floor(Math.random() * levelData.words.length)];
            
            // Create a word object
            activeWords.push({
                text: randomWord.text,
                cat: randomWord.cat,
                x: Math.random() * (window.innerWidth - 200) + 100, 
                y: -50,
                radius: 40,
                isGrabbed: false,
                grabberId: null, // 'left' or 'right'
                baseSpeed: levelData.speed + (Math.random() * 0.8) // Base random speed for the word
            });

            // Adjust next spawn timeout depending on remaining time
            // The less time remains, the faster words spawn
            let timeLeftRatio = timer / 60; // 1.0 down to 0.0
            let speedRatio = 0.5 + (timeLeftRatio * 0.5); // Spawns up to 2x faster near 0s
            let currentSpawnRate = levelData.spawnRate * speedRatio;

            spawnTimeoutId = setTimeout(spawnWordRecursive, currentSpawnRate);
        }

        function beginPlaying() {
            gameState = 'PLAYING';
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('hud').classList.add('flex');
            document.getElementById('quit-btn').classList.remove('hidden');
            document.getElementById('speed-hud').classList.remove('hidden');

            audio.startBGM();
            spawnWordRecursive();
            
            // Game timer countdown tick
            timerInterval = setInterval(() => {
                if(gameState !== 'PLAYING') return;
                timer--;
                updateHUD();
                
                if (timer <= 0) {
                    if (currentLevel < 3) {
                        completeLevel();
                    } else {
                        endGame();
                    }
                }
            }, 1000);
        }

        function completeLevel() {
            gameState = 'TRANSITION';
            clearTimeout(spawnTimeoutId);
            clearInterval(timerInterval);
            
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('hud').classList.remove('flex');
            document.getElementById('quit-btn').classList.add('hidden');
            
            const transScreen = document.getElementById('transition-screen');
            document.getElementById('trans-level-text').innerText = `ผ่านด่านที่ ${currentLevel}!`;
            transScreen.classList.remove('hidden');
            
            setTimeout(() => {
                transScreen.classList.add('hidden');
                startGame(currentLevel + 1, false);
            }, 3000);
        }

        function endGame() {
            gameState = 'END';
            clearTimeout(spawnTimeoutId);
            clearInterval(timerInterval);
            audio.stopBGM();
            activeWords.length = 0;
            particles.length = 0;
            handsData = [];

            document.getElementById('hud').classList.add('hidden');
            document.getElementById('hud').classList.remove('flex');
            document.getElementById('quit-btn').classList.add('hidden');
            
            const endScreen = document.getElementById('game-over-screen');
            document.getElementById('final-score').innerText = score;
            endScreen.classList.remove('hidden');
        }

        function updateHUD() {
            document.getElementById('hud-level').innerText = currentLevel;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timer;
            
            // Calculate and display speed multiplier on HUD
            let timeLeftRatio = timer / 60; // 1.0 down to 0.0
            let currentSpeedMult = (1.0 + (1.0 - timeLeftRatio) * 1.5).toFixed(1);
            document.getElementById('speed-multiplier').innerText = currentSpeedMult;
            
            if(timer <= 15) {
                document.getElementById('timer').classList.add('text-red-500', 'animate-pulse-fast');
                document.getElementById('speed-hud').classList.add('text-red-400');
            } else {
                document.getElementById('timer').classList.remove('text-red-500', 'animate-pulse-fast');
                document.getElementById('speed-hud').classList.remove('text-red-400');
            }
        }

        function createParticles(x, y, colorHex) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: colorHex
                });
            }
        }

        function gameLoop() {
            const isActive = (gameState === 'PLAYING' || gameState === 'COUNTDOWN');
            handsData = [];

            // 1. Process Video -> MediaPipe Hand Tracking (skip when idle)
            if (isActive && handLandmarker && video.readyState >= 2) {
                let startTimeMs = performance.now();
                const results = handLandmarker.detectForVideo(video, startTimeMs);
                
                if (results.landmarks) {
                    for (let i = 0; i < results.landmarks.length; i++) {
                        const marks = results.landmarks[i];
                        
                        let handedness = "Unknown";
                        if (results.handedness && results.handedness[i] && results.handedness[i].length > 0) {
                            handedness = results.handedness[i][0].categoryName;
                        } else {
                            handedness = "Hand_" + i;
                        }
                        
                        const mapX = (x) => (1 - x) * window.innerWidth; 
                        const mapY = (y) => y * window.innerHeight;
                        
                        const thumbTip = { x: mapX(marks[4].x), y: mapY(marks[4].y) };
                        const indexTip = { x: mapX(marks[8].x), y: mapY(marks[8].y) };
                        
                        const distance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                        const isPinching = distance < (window.innerWidth * 0.05);
                        
                        const center = { x: (thumbTip.x + indexTip.x)/2, y: (thumbTip.y + indexTip.y)/2 };
                        
                        handsData.push({ id: handedness, indexTip, thumbTip, center, isPinching });
                    }
                }
            }

            // 2. Clear 2D HUD/Interaction Canvas
            ctx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);

            // 3. Update & Render Game Objects
            if (gameState === 'PLAYING') {
                
                // Draw Warning text if time is ticking out
                if (timer <= 20) {
                    ctx.save();
                    ctx.fillStyle = "rgba(239, 68, 68, 0.85)";
                    ctx.font = "bold 26px 'Sarabun', sans-serif";
                    ctx.textAlign = "center";
                    ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                    ctx.shadowBlur = 4;
                    ctx.fillText("⚠️ เร่งความเร็วตัวสะกดด่วน! ⚠️", window.innerWidth / 2, 50);
                    ctx.restore();
                }

                // Update & Render Basket Label Elements (2D badge attached to 3D basket coordinate space)
                baskets3D.forEach(b => {
                    const proj = b.mesh.position.clone();
                    proj.project(camera);
                    const screenX = (proj.x * .5 + .5) * window.innerWidth;
                    const screenY = (proj.y * -.5 + .5) * window.innerHeight;
                    
                    const label = b.def.label;
                    ctx.font = "bold 20px 'Sarabun', sans-serif";
                    
                    const textWidth = ctx.measureText(label).width;
                    const badgeWidth = textWidth + 28;
                    const badgeHeight = 36;
                    const badgeX = screenX - badgeWidth/2;
                    const badgeY = screenY + 45;

                    // Rounded matching color background badge
                    ctx.fillStyle = b.def.hex;
                    ctx.beginPath();
                    if (ctx.roundRect) {
                        ctx.roundRect(badgeX, badgeY, badgeWidth, badgeHeight, 8);
                    } else {
                        ctx.rect(badgeX, badgeY, badgeWidth, badgeHeight);
                    }
                    ctx.fill();

                    // White borders
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 2.5;
                    ctx.stroke();

                    // Typography
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(label, screenX, badgeY + badgeHeight/2);
                });

                // Calculate current Speed Multiplier based on time elapsed
                // Starts at 1.0x when timer is 60, ramps smoothly up to 2.5x speed when timer reaches 0
                let timeLeftRatio = timer / 60; // 1.0 (start) down to 0.0 (end)
                let timeSpeedMultiplier = 1.0 + (1.0 - timeLeftRatio) * 1.5; 

                // Update falling Words physics
                for (let i = activeWords.length - 1; i >= 0; i--) {
                    let word = activeWords[i];
                    let currentlyGrabbedBy = null;
                    
                    if (word.isGrabbed) {
                        const grabbingHand = handsData.find(h => h.id === word.grabberId);
                        if (grabbingHand && grabbingHand.isPinching) {
                            word.x = word.x + (grabbingHand.center.x - word.x) * 0.3;
                            word.y = word.y + (grabbingHand.center.y - word.y) * 0.3;
                            currentlyGrabbedBy = grabbingHand.id;
                        } else {
                            // Released from hand
                            word.isGrabbed = false;
                            word.grabberId = null;
                            audio.playBeep();

                            // Check collision with baskets
                            let wordConsumed = false;
                            for (const b of baskets3D) {
                                const proj = b.mesh.position.clone();
                                proj.project(camera);
                                const bx = (proj.x * .5 + .5) * window.innerWidth;
                                const by = (proj.y * -.5 + .5) * window.innerHeight;
                                const radiusSq = Math.pow(window.innerWidth/8, 2);

                                if (Math.pow(word.x - bx, 2) + Math.pow(word.y - by, 2) < radiusSq) {
                                    if (word.cat === b.def.cat) {
                                        score += 10;
                                        audio.playSuccess();
                                        createParticles(word.x, word.y, b.def.hex);
                                        b.mesh.scale.set(1.25, 1.25, 1.25);
                                        setTimeout(()=> b.mesh.scale.set(1,1,1), 200);
                                    } else {
                                        score = Math.max(0, score - 5);
                                        audio.playFail();
                                        createParticles(word.x, word.y, "#ff0000");
                                    }
                                    activeWords.splice(i, 1);
                                    wordConsumed = true;
                                    break;
                                }
                            }
                            if (wordConsumed) continue;
                        }
                    } else {
                        // Apply dynamic speed multiplier directly to the downward motion
                        word.y += word.baseSpeed * timeSpeedMultiplier;
                        
                        handsData.forEach(hand => {
                            if (hand.isPinching && !currentlyGrabbedBy) {
                                const distSq = Math.pow(hand.center.x - word.x, 2) + Math.pow(hand.center.y - word.y, 2);
                                if (distSq < Math.pow(word.radius + 30, 2)) {
                                    word.isGrabbed = true;
                                    word.grabberId = hand.id;
                                    currentlyGrabbedBy = hand.id;
                                    audio.playGrab();
                                }
                            }
                        });
                        
                        // Delete word if fell off screen
                        if (word.y > window.innerHeight + 100 && activeWords[i]) {
                            activeWords.splice(i, 1);
                        }
                    }
                    
                    // Draw Word Bubble UI
                    if (activeWords[i]) {
                        ctx.save();
                        ctx.translate(word.x, word.y);
                        
                        // Bubble shadow glow
                        ctx.shadowColor = word.isGrabbed ? "rgba(255, 235, 59, 0.5)" : "rgba(0, 0, 0, 0.25)";
                        ctx.shadowBlur = word.isGrabbed ? 15 : 8;

                        // Bubble background
                        ctx.beginPath();
                        ctx.arc(0, 0, word.radius, 0, Math.PI * 2);
                        ctx.fillStyle = word.isGrabbed ? "rgba(255, 255, 255, 0.95)" : "rgba(255, 255, 255, 0.85)";
                        ctx.fill();
                        ctx.lineWidth = word.isGrabbed ? 4 : 2.5;
                        ctx.strokeStyle = word.isGrabbed ? "#ffeb3b" : "#ffffff";
                        ctx.stroke();
                        
                        // Text rendering
                        ctx.shadowColor = "transparent";
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "bold 26px 'Sarabun', sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(word.text, 0, 1);
                        ctx.restore();
                    }
                }
            }

            // 4. Render Hand Pointers (skip when idle)
            if (isActive) handsData.forEach(hand => {
                ctx.beginPath();
                ctx.arc(hand.center.x, hand.center.y, hand.isPinching ? 15 : 10, 0, Math.PI * 2);
                ctx.fillStyle = hand.isPinching ? "rgba(255, 235, 59, 0.85)" : "rgba(33, 150, 243, 0.65)";
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(hand.thumbTip.x, hand.thumbTip.y);
                ctx.lineTo(hand.indexTip.x, hand.indexTip.y);
                ctx.strokeStyle = hand.isPinching ? "#ffeb3b" : "rgba(255,255,255,0.4)";
                ctx.lineWidth = hand.isPinching ? 4 : 2;
                ctx.stroke();
            });
            
            // 5. Update Particles Burst system
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.04;
                if(p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }

            // 6. Render Three.js Scene (skip when idle)
            if (isActive) {
                renderer.render(scene, camera);
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // Event Listeners for UI
        document.getElementById('start-game-btn').addEventListener('click', () => {
            startGame(1, true);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            gameState = 'MENU';
            baskets3D.forEach(b => b.mesh.scale.set(1,1,1));
        });
        
        document.getElementById('quit-btn').addEventListener('click', () => {
            endGame();
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            gameState = 'MENU';
        });

        // Initialize WebGL/Camera systems
        initThreeJS();
        initMediaPipe();
        
    </script>
</body>
</html>
